# Build Docker + déploiement Cloud Run.
# Déclencher : gcloud builds submit --config cloudbuild.yaml .
#
# Config Firebase publique (commitée) : config/firebase.public.json
# Surcharger l’URL API : --substitutions=_API_URL=https://...

substitutions:
  _REGION: europe-west9
  _REPOSITORY: unilyse-admin
  _SERVICE: unilyse-admin
  _API_URL: https://public-api-531732557398.europe-west9.run.app
  _NEXT_PUBLIC_REQUIRE_AUTH: "true"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: prepare-firebase-env
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - node scripts/firebase-build-args.mjs --write-env firebase.build.env

  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        set -a
        # shellcheck disable=SC1091
        source firebase.build.env
        set +a
        export API_URL=${_API_URL}
        export NEXT_PUBLIC_REQUIRE_AUTH=${_NEXT_PUBLIC_REQUIRE_AUTH}
        docker build \
          --build-arg API_URL="$$API_URL" \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$$NEXT_PUBLIC_FIREBASE_API_KEY" \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$$NEXT_PUBLIC_FIREBASE_APP_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID="$$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID" \
          --build-arg NEXT_PUBLIC_REQUIRE_AUTH="$$NEXT_PUBLIC_REQUIRE_AUTH" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"
      - --set-env-vars
      - API_URL=${_API_URL}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
