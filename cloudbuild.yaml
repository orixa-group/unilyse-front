# Build Docker + déploiement Cloud Run.
# Déclencher : gcloud builds submit --config cloudbuild.yaml .
#
# Firebase : config/firebase.public.json (commitée, lue au build Docker).
# Surcharger l’URL API : --substitutions=_API_URL=https://...

substitutions:
  _REGION: europe-west9
  _REPOSITORY: unilyse-admin
  _SERVICE: unilyse-admin
  _API_URL: https://public-api-531732557398.europe-west9.run.app
  _NEXT_PUBLIC_REQUIRE_AUTH: "true"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - API_URL=${_API_URL}
      - --build-arg
      - NEXT_PUBLIC_REQUIRE_AUTH=${_NEXT_PUBLIC_REQUIRE_AUTH}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"
      - --set-env-vars
      - API_URL=${_API_URL}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
